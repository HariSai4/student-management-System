<div class="container mt-5">
    <div class="card shadow p-4">

        <h3 class="text-center mb-4">
            Add Student
        </h3>

        <form>

            <input type="text"
                   class="form-control mb-3"
                   placeholder="Student Name">

            <input type="number"
                   class="form-control mb-3"
                   placeholder="Age">

            <input type="text"
                   class="form-control mb-3"
                   placeholder="Course">

            <input type="email"
                   class="form-control mb-3"
                   placeholder="Email">

            <button class="btn btn-primary w-100">
                Add Student
            </button>

        </form>

    </div>
</div>
